<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>متجري الإلكتروني</title>
  <style>
    body {font-family:sans-serif;margin:0;padding:20px;background:#fff;}
    header {text-align:center;padding:20px;background:#222;color:#fff;border-radius:10px;position:relative;}
    .cart-btn {position:absolute;top:20px;left:20px;font-size:28px;color:#fff;text-decoration:none;}
    .cart-count {background:red;color:#fff;padding:3px 8px;border-radius:50%;font-size:14px;position:absolute;top:15px;left:55px;}
    .dropdown {position:absolute;top:20px;right:20px;}
    .dropbtn {background:#007bff;color:#fff;padding:10px 15px;border:none;border-radius:5px;cursor:pointer;}
    .dropdown-content {display:none;position:absolute;right:0;background:#f9f9f9;min-width:160px;box-shadow:0 8px 16px rgba(0,0,0,0.2);border-radius:5px;}
    .dropdown-content a {display:block;padding:10px;color:#000;text-decoration:none;}
    .dropdown-content a:hover {background:#ddd;}
    .dropdown:hover .dropdown-content {display:block;}
    .products {display:flex;gap:20px;margin-top:30px;justify-content:center;flex-wrap:wrap;}
    .product {background:#fff;padding:15px;width:200px;border-radius:10px;box-shadow:0 0 10px #ccc;text-align:center;}
    .product img {width:100%;border-radius:10px;}
    .btn,.delete-btn,.edit-btn {display:inline-block;margin-top:5px;padding:8px 12px;border-radius:5px;color:#fff;text-decoration:none;}
    .btn{background:#007bff;} .delete-btn{background:red;} .edit-btn{background:orange;}
    #add-product-btn {position:fixed;bottom:20px;right:20px;background:green;color:#fff;padding:12px 18px;border-radius:8px;cursor:pointer;display:none;}
    .modal {display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);}
    .modal-content {background:#fff;margin:15% auto;padding:15px;border-radius:8px;width:280px;text-align:center;}
    .modal-content input,.modal-content textarea {width:95%;margin:5px 0;padding:6px;}
  </style>
</head>
<body>

<header>
  <h1>سلامينا</h1>
  <p>أفضل المنتجات بأفضل الأسعار</p>
  <a href="cart.html" class="cart-btn">🛒</a>
  <span id="cart-count" class="cart-count">0</span>
  <div class="dropdown">
    <button class="dropbtn">☰</button>
    <div class="dropdown-content" id="menu"></div>
  </div>
</header>

<div class="products"></div>
<button id="add-product-btn" onclick="openModal()">➕ إضافة منتج</button>

<!-- نافذة إضافة المنتج -->
<div id="productModal" class="modal">
  <div class="modal-content">
    <h3>إضافة منتج</h3>
    <input id="prodName" placeholder="اسم المنتج">
    <input id="prodImage" placeholder="رابط الصورة">
    <input id="prodPrice" placeholder="السعر">
    <textarea id="prodDesc" placeholder="الوصف"></textarea>
    <button onclick="saveProduct()">حفظ</button>
    <button onclick="closeModal()">إلغاء</button>
  </div>
</div>

<script>
function loadProducts(){
  let products=JSON.parse(localStorage.getItem("products"))||[];
  let c=document.querySelector(".products");c.innerHTML="";
  let isAdmin=localStorage.getItem("isAdmin")==="true";
  products.forEach((p,i)=>{
    c.innerHTML+=`
      <div class="product">
        <img src="${p.image}" alt="${p.name}">
        <h3>${p.name}</h3><p>${p.price} ل.س</p><p>${p.description||""}</p>
        <a href="#" class="btn" onclick="addToCart(${i})">إضافة للسلة</a>
        ${isAdmin?`<a href="#" class="delete-btn" onclick="deleteProduct(${i})">حذف</a>
        <a href="#" class="edit-btn" onclick="editProduct(${i})">تعديل</a>`:""}
      </div>`;
  });
}

window.onload=function(){
  let menu=document.getElementById("menu");
  let isAdmin=localStorage.getItem("isAdmin")==="true";
  let currentUser=JSON.parse(localStorage.getItem("currentUser"));
  let cart=JSON.parse(localStorage.getItem("cart"))||[];
  document.getElementById("cart-count").textContent=cart.length;

  // خيارات تسجيل الدخول مرتبة فوق بعض
  if(isAdmin){
    menu.innerHTML=`
      <a href="#">لوحة المدير</a>
      <a href="#" onclick="logout()">تسجيل الخروج</a>
    `;
    document.getElementById("add-product-btn").style.display="block";
  } else if(currentUser){
    menu.innerHTML=`
      <a href="profile.html">ملفي الشخصي</a>
      <a href="#" onclick="logout()">تسجيل الخروج</a>
    `;
  } else {
    menu.innerHTML=`
      <a href="login.html">تسجيل الدخول</a>
      <a href="#" onclick="adminLogin()">دخول المدير</a>
    `;
  }
  loadProducts();
};

function logout(){
  localStorage.removeItem("currentUser");
  localStorage.removeItem("isAdmin");
  location.reload();
}

function adminLogin(){
  if(prompt("كلمة مرور المدير:")==="HadiAdminMNL"){
    localStorage.setItem("isAdmin","true");
    location.reload();
  } else alert("كلمة المرور غير صحيحة");
}

function addToCart(i){
  let p=JSON.parse(localStorage.getItem("products"))||[],c=JSON.parse(localStorage.getItem("cart"))||[];
  c.push(p[i]);localStorage.setItem("cart",JSON.stringify(c));
  document.getElementById("cart-count").textContent=c.length;
}

function deleteProduct(i){
  if(localStorage.getItem("isAdmin")!=="true")return;
  let p=JSON.parse(localStorage.getItem("products"))||[];
  p.splice(i,1);localStorage.setItem("products",JSON.stringify(p));
  loadProducts();
}

function editProduct(i){
  if(localStorage.getItem("isAdmin")!=="true")return;
  let p=JSON.parse(localStorage.getItem("products"))||[],prod=p[i];
  prod.name=prompt("اسم جديد:",prod.name);
  prod.image=prompt("صورة:",prod.image);
  prod.price=prompt("سعر:",prod.price);
  prod.description=prompt("وصف:",prod.description||"");
  localStorage.setItem("products",JSON.stringify(p));
  loadProducts();
}

function openModal(){document.getElementById("productModal").style.display="block";}
function closeModal(){document.getElementById("productModal").style.display="none";}
function saveProduct(){
  if(localStorage.getItem("isAdmin")!=="true")return;
  let name=document.getElementById("prodName").value,
      img=document.getElementById("prodImage").value,
      price=document.getElementById("prodPrice").value,
      desc=document.getElementById("prodDesc").value;
  if(name&&img&&price){
    let p=JSON.parse(localStorage.getItem("products"))||[];
    p.push({name,image:img,price,description:desc});
    localStorage.setItem("products",JSON.stringify(p));
    closeModal();loadProducts();
  } else alert("أدخل كل البيانات");
}
</script>
</body>
</html>
