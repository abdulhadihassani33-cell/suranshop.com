<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>تسجيل الدخول / إنشاء حساب</title>
  <style>
      body {
          font-family: 'Tahoma', sans-serif;
          background: #f0f2f5;
          margin: 0;
          padding: 0;
      }

      header {
          text-align: center;
          padding: 20px;
          background: #007bff;
          color: white;
          font-size: 24px;
          font-weight: bold;
      }

      .container {
          display: flex;
          justify-content: space-around;
          flex-wrap: wrap;
          margin: 30px;
      }

      .box {
          background: white;
          padding: 25px;
          border-radius: 10px;
          box-shadow: 0 0 15px rgba(0,0,0,0.1);
          width: 400px;
          margin-bottom: 20px;
      }

      .box h2 {
          text-align: center;
          margin-bottom: 20px;
          color: #333;
      }

      label {
          display: block;
          margin-top: 10px;
          font-weight: bold;
          color: #555;
      }

      input {
          width: 100%;
          padding: 10px;
          margin-top: 5px;
          border: 1px solid #ccc;
          border-radius: 5px;
          font-size: 14px;
      }

      .btn {
          margin-top: 15px;
          width: 100%;
          padding: 12px;
          background: #007bff;
          color: white;
          border: none;
          border-radius: 5px;
          font-size: 16px;
          cursor: pointer;
      }

      .btn:hover {
          background: #0056b3;
      }

      .register-btn {
          background: #28a745;
      }

      .register-btn:hover {
          background: #1e7e34;
      }
  </style>
</head>
<body>

<header>
    تسجيل الدخول / إنشاء حساب
</header>

<div class="container">
    <!-- تسجيل الدخول -->
    <div class="box">
        <h2>تسجيل الدخول</h2>
        <label>البريد الإلكتروني:</label>
        <input type="email" id="email">

        <label>كلمة السر:</label>
        <input type="password" id="password">

        <button class="btn" onclick="login()">تسجيل الدخول</button>
    </div>

    <!-- إنشاء حساب جديد -->
    <div class="box">
        <h2>إنشاء حساب جديد</h2>
        <label>الاسم الأول:</label>
        <input type="text" id="firstName">

        <label>الاسم الثاني:</label>
        <input type="text" id="lastName">

        <label>البريد الإلكتروني:</label>
        <input type="email" id="regEmail">

        <label>رقم الجوال:</label>
        <input type="text" id="phone">

        <label>العمر:</label>
        <input type="number" id="age">

        <label>تاريخ الميلاد:</label>
        <input type="date" id="birthDate">

        <label>كلمة السر:</label>
        <input type="password" id="regPassword">

        <button class="btn register-btn" onclick="register()">إنشاء الحساب</button>
    </div>
</div>

<script>
// تسجيل الدخول
function login() {
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    let users = JSON.parse(localStorage.getItem("users")) || [];
    let user = users.find(u => u.email === email && u.password === password);

    if(user) {
        localStorage.setItem("currentUser", JSON.stringify(user));
        alert("تم تسجيل الدخول بنجاح");
        window.location.href = "index.html";
    } else {
        alert("بيانات غير صحيحة");
    }
}

// إنشاء حساب جديد
function register() {
    let firstName = document.getElementById("firstName").value;
    let lastName = document.getElementById("lastName").value;
    let email = document.getElementById("regEmail").value;
    let phone = document.getElementById("phone").value;
    let age = document.getElementById("age").value;
    let birthDate = document.getElementById("birthDate").value;
    let password = document.getElementById("regPassword").value;

    if(!firstName || !lastName || !email || !phone || !age || !birthDate || !password) {
        alert("يجب إدخال جميع البيانات");
        return;
    }

    let users = JSON.parse(localStorage.getItem("users")) || [];
    if(users.find(u => u.email === email)) {
        alert("هذا البريد مسجل مسبقًا");
        return;
    }

    let newUser = {
        firstName: firstName,
        lastName: lastName,
        email: email,
        phone: phone,
        age: age,
        birthDate: birthDate,
        password: password,
        language: "ar"
    };

    users.push(newUser);
    localStorage.setItem("users", JSON.stringify(users));
    localStorage.setItem("currentUser", JSON.stringify(newUser));
    localStorage.setItem("userProfile", JSON.stringify(newUser));

    alert("تم إنشاء الحساب وتسجيل الدخول");
    window.location.href = "profile.html";
}
</script>

</body>
</html>
